<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wheel of Misfortune</title>
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <main class="app">
    <section class="panel">
      <h1>Wheel of Misfortune</h1>
      <p class="subtitle">Spin the wheel and seal your fate</p>

      <div class="mode mode-setup" id="setupMode">
        <h2>Setup</h2>
        <label for="csvInput">Upload CSV with headers: Name,Description</label>
        <input id="csvInput" type="file" accept=".csv,text/csv">
        <button id="startButton" class="primary">Build Wheel</button>
      </div>

      <div class="mode mode-play hidden" id="playMode">
        <h2>Play</h2>
        <p id="previousPrizeText" class="previous-prize hidden"></p>
        <p id="remainingText" class="remaining hidden"></p>
        <button id="spinButton" class="spin-button">SPIN</button>
      </div>

      <p id="errorText" class="error" aria-live="polite"></p>

    </section>

    <section class="wheel-area">
      <div class="wheel-frame">
        <div class="pointer" aria-hidden="true"></div>
        <canvas id="wheelCanvas" width="560" height="560" aria-label="Wheel"></canvas>
      </div>
    </section>
  </main>
  <p class="footer-actions">
    <button id="restartLink" class="restart-link" type="button">Start Over</button>
  </p>

  <div id="winnerModal" class="winner-modal hidden" role="dialog" aria-modal="true" aria-labelledby="winnerTitle">
    <div class="winner-card">
      <button id="closeWinnerModalButton" class="close-winner-modal" type="button" aria-label="Close winner modal">x</button>
      <p class="winner-tag">BIG WINNER</p>
      <h2 id="winnerTitle" class="winner-title">Your Prize</h2>
      <p id="winnerModalText" class="winner-value"></p>
      <p id="winnerModalDescription" class="winner-description"></p>
    </div>
  </div>

  <canvas id="confettiCanvas" class="confetti-canvas hidden" aria-hidden="true"></canvas>

  <script src="./app.js"></script>
</body>
</html>
